name: Deploy to GitHub Pages

# Static demo for pv-os. No build step — we publish the repo root as-is.
# Pages must be enabled in repo settings (Settings → Pages → Source: GitHub Actions).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queue (don't cancel) so a fast follow-up still ships.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          # Repo root — index.html, app.js, styles.css. Skip CI/git metadata.
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
